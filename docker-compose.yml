version: '3.9'

services:
  backend:
    build: ./backend
    container_name: agentdb-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/databases:/app/databases
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agentdb-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
