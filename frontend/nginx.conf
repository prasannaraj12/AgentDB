server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /chat {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /databases {
        proxy_pass http://backend:8000;
    }

    location /export {
        proxy_pass http://backend:8000;
    }

    location /report {
        proxy_pass http://backend:8000;
    }

    location /suggestions {
        proxy_pass http://backend:8000;
    }
}
